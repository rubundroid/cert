<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - e-Cert</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 800px; margin: auto; }
        h2 { color: #1565c0; border-bottom: 2px solid #1565c0; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h3 { color: #f57f17; margin-top: 30px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        h3.master-title { color: #2e7d32; }
        
        /* ലോഗിൻ ബോക്സ് സ്റ്റൈൽ */
        #loginScreen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #loginScreen input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #loginScreen button { width: 100%; padding: 12px; background: #1565c0; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loginScreen button:hover { background: #0d47a1; }

        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #ffb300; }
        .card.approved-card { border-left-color: #1976D2; }
        label { font-size: 13px; font-weight: bold; color: #555; }
        textarea, input.edit-input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        button.action-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin-right: 10px; }
        .btn-approve { background-color: #2e7d32; color: white; }
        .btn-update { background-color: #1976D2; color: white; }
        .btn-delete { background-color: #d32f2f; color: white; }
        .btn-logout { background-color: #d32f2f; color: white; font-size: 12px; padding: 6px 12px; }
        .empty-msg { text-align: center; color: #888; margin-top: 20px; font-style: italic; background: #eee; padding: 15px; border-radius: 5px; }
        
        /* തുടക്കത്തിൽ ഡാഷ്ബോർഡ് ഒളിച്ചു വെക്കുന്നു */
        #dashboardScreen { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2 style="justify-content: center;">🔒 Admin Login</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">അഡ്മിൻ പാനലിലേക്ക് പ്രവേശിക്കാൻ ലോഗിൻ ചെയ്യുക.</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginAdmin()">Login</button>
        <p id="loginError" style="color: red; font-size: 13px; margin-top: 15px; display: none;"></p>
    </div>

    <div id="dashboardScreen">
        <h2>🛡️ e-Cert Admin Dashboard <button class="action-btn btn-logout" onclick="logoutAdmin()">Logout</button></h2>

        <h3>⏳ Pending Approvals (പുതിയവ)</h3>
        <div id="pendingList"><div class="empty-msg">Loading...</div></div>

        <h3 class="master-title">✅ Master List (പബ്ലിക് ആയവ)</h3>
        <div id="approvedList"><div class="empty-msg">Loading...</div></div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyACkm66_JQYhNjzIdWtI24OAm8oGNq9niM",
  authDomain: "e-cert-database.firebaseapp.com",
  databaseURL: "https://e-cert-database-default-rtdb.firebaseio.com",
  projectId: "e-cert-database",
  storageBucket: "e-cert-database.firebasestorage.app",
  messagingSenderId: "815130577533",
  appId: "1:815130577533:web:924e300fa217e78fc07f14"
};
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();

        // --- AUTHENTICATION LOGIC ---
        // ലോഗിൻ സ്റ്റാറ്റസ് ചെക്ക് ചെയ്യുന്നു
        auth.onAuthStateChanged((user) => {
            if (user) {
                // ലോഗിൻ ചെയ്താൽ ഡാഷ്ബോർഡ് കാണിക്കുക
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                loadPendingCertificates();
                loadApprovedCertificates();
            } else {
                // ലോഗിൻ ചെയ്തിട്ടില്ലെങ്കിൽ ലോഗിൻ സ്ക്രീൻ കാണിക്കുക
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('dashboardScreen').style.display = 'none';
            }
        });

        function loginAdmin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            
            if(!email || !pass) {
                errorMsg.innerText = "ദയവായി ഇമെയിലും പാസ്‌വേഡും നൽകുക!";
                errorMsg.style.display = 'block';
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => {
                    errorMsg.innerText = "Error: " + error.message;
                    errorMsg.style.display = 'block';
                });
        }

        function logoutAdmin() {
            auth.signOut();
        }

        // --- DATABASE LOGIC (Pending & Approved) ---
        function loadPendingCertificates() {
            db.ref('pending_certificates').on('value', snapshot => {
                const data = snapshot.val();
                const list = document.getElementById('pendingList');
                list.innerHTML = '';
                if (!data) { list.innerHTML = '<div class="empty-msg">✅ അപ്രൂവ് ചെയ്യാൻ പുതിയ സർട്ടിഫിക്കറ്റുകൾ ഒന്നുമില്ല!</div>'; return; }

                Object.keys(data).forEach(key => {
                    const cert = data[key];
                    list.innerHTML += `
                        <div class="card" id="card_${key}">
                            <textarea id="text_${key}" rows="3">${cert.text}</textarea>
                            <input type="text" class="edit-input" id="cat_${key}" value="${cert.category}">
                            <div>
                                <button class="action-btn btn-approve" onclick="approveCert('${key}')">✅ Approve & Publish</button>
                                <button class="action-btn btn-delete" onclick="deletePending('${key}')">🗑️ Reject</button>
                            </div>
                        </div>`;
                });
            });
        }

        function approveCert(key) {
            const updatedText = document.getElementById('text_' + key).value.trim();
            const updatedCategory = document.getElementById('cat_' + key).value.trim();
            db.ref('approved_certificates').push({ text: updatedText, category: updatedCategory })
            .then(() => db.ref('pending_certificates/' + key).remove());
        }

        function deletePending(key) {
            if(confirm("ഈ സർട്ടിഫിക്കറ്റ് ഒഴിവാക്കണോ?")) db.ref('pending_certificates/' + key).remove();
        }

        function loadApprovedCertificates() {
            db.ref('approved_certificates').on('value', snapshot => {
                const data = snapshot.val();
                const list = document.getElementById('approvedList');
                list.innerHTML = '';
                if (!data) { list.innerHTML = '<div class="empty-msg">Master list is empty!</div>'; return; }

                Object.keys(data).forEach(key => {
                    const cert = data[key];
                    list.innerHTML += `
                        <div class="card approved-card" id="app_card_${key}">
                            <textarea id="app_text_${key}" rows="3">${cert.text}</textarea>
                            <input type="text" class="edit-input" id="app_cat_${key}" value="${cert.category}">
                            <div>
                                <button class="action-btn btn-update" onclick="updateApproved('${key}')">💾 Save Changes</button>
                                <button class="action-btn btn-delete" onclick="deleteApproved('${key}')">🗑️ Delete</button>
                            </div>
                        </div>`;
                });
            });
        }

        function updateApproved(key) {
            db.ref('approved_certificates/' + key).update({
                text: document.getElementById('app_text_' + key).value.trim(),
                category: document.getElementById('app_cat_' + key).value.trim()
            }).then(() => alert("💾 Changes Saved!"));
        }

        function deleteApproved(key) {
            if(confirm("ഇത് പബ്ലിക് ലിസ്റ്റിൽ നിന്നും ഡിലീറ്റ് ആകും. തുടരണോ?")) db.ref('approved_certificates/' + key).remove();
        }
    </script>
</body>
</html>

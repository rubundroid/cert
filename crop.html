<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Auto-Crop & Optimizer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f0f2f5; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #007bff; }
        .image-box { margin: 20px 0; padding: 20px; border: 1px solid #e1e4e8; border-radius: 10px; background: #fafafa; }
        .preview-img { max-width: 100%; max-height: 250px; margin-top: 15px; border: 2px dashed #007bff; background: #fff; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #218838; }
        input[type="file"] { margin-bottom: 20px; width: 100%; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .controls-container { margin-top: 20px; background: #eee; padding: 15px; border-radius: 8px; text-align: left; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .val-display { font-weight: normal; color: #666; float: right; font-weight: bold; }
        .status-text { font-weight: bold; font-size: 15px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>സിഗ്നേച്ചർ / സീൽ ഓപ്റ്റിമൈസർ</h2>
        <p>Edge Detection Auto Crop + Color Adjustment (< 15KB)</p>
        
        <input type="file" id="imageInput" accept="image/*" multiple max="3">
        <div id="outputArea"></div>
    </div>

    <script>
        let originalCroppedImages = []; 

        document.getElementById('imageInput').addEventListener('change', function(event) {
            const files = event.target.files;
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = ''; 
            originalCroppedImages = [];

            if (files.length > 3) {
                alert("പരമാവധി 3 ചിത്രങ്ങൾ മാത്രം തിരഞ്ഞെടുക്കുക.");
                return;
            }

            Array.from(files).forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const tempImg = new Image();
                    tempImg.onload = function() {
                        // 1. ഫോട്ടോ ലോഡ് ആകുമ്പോൾ തന്നെ പുതിയ Edge Detection Auto Crop നടക്കുന്നു
                        const croppedDataUrl = autoCropImage(tempImg);
                        
                        const finalImg = new Image();
                        finalImg.onload = function() {
                            originalCroppedImages[index] = finalImg; 
                            createUI(index);
                            processImage(index, 160, 50, 0); 
                        };
                        finalImg.src = croppedDataUrl;
                    };
                    tempImg.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        // --- ഏറ്റവും പുതിയ Edge Detection Auto Crop ---
        function autoCropImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const MAX_WIDTH = 800; 
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) {
                height = Math.round((height * MAX_WIDTH) / width);
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);

            let imgData = ctx.getImageData(0, 0, width, height);
            let data = imgData.data;

            let inkX = [];
            let inkY = [];

            // ഫോട്ടോയുടെ അരികുകളിലെ പ്രശ്നങ്ങൾ ഒഴിവാക്കാൻ 5% മാർജിൻ മാറ്റുന്നു
            let marginX = Math.floor(width * 0.05);
            let marginY = Math.floor(height * 0.05);

            for (let y = marginY; y < height - marginY; y++) {
                for (let x = marginX; x < width - marginX; x++) {
                    let idx = (y * width + x) * 4;
                    let r = data[idx], g = data[idx+1], b = data[idx+2];
                    
                    let grayPixel = (0.299 * r) + (0.587 * g) + (0.114 * b);

                    // തൊട്ടടുത്ത പിക്സലുകളുമായി താരതമ്യം ചെയ്യുന്നു (Local Contrast / Edge Detection)
                    let rightIdx = (y * width + (x + 2)) * 4;
                    let bottomIdx = ((y + 2) * width + x) * 4;

                    let grayRight = x + 2 < width ? (0.299 * data[rightIdx] + 0.587 * data[rightIdx+1] + 0.114 * data[rightIdx+2]) : grayPixel;
                    let grayBottom = y + 2 < height ? (0.299 * data[bottomIdx] + 0.587 * data[bottomIdx+1] + 0.114 * data[bottomIdx+2]) : grayPixel;

                    let diffX = Math.abs(grayPixel - grayRight);
                    let diffY = Math.abs(grayPixel - grayBottom);

                    // കളർ വ്യത്യാസം കണ്ടെത്തുന്നു (മഷി നീലയോ പച്ചയോ ആണെങ്കിൽ)
                    let colorDiff = Math.max(r, g, b) - Math.min(r, g, b);

                    // നിഴലുകൾ ഒഴിവാക്കി, ഷാർപ്പ് ആയ വരകളോ (diff > 15) തെളിഞ്ഞ നിറമോ (color > 40) മാത്രം എടുക്കുന്നു
                    if ((diffX > 15 || diffY > 15 || colorDiff > 40) && grayPixel < 220) {
                        inkX.push(x);
                        inkY.push(y);
                    }
                }
            }

            let minX = 0, minY = 0, maxX = width, maxY = height;
            let padding = 20;

            if (inkX.length > 50) { 
                inkX.sort((a, b) => a - b);
                inkY.sort((a, b) => a - b);

                // വേണ്ടാത്ത പൊടികളും ഫോട്ടോയുടെ മൂലയിലുള്ള കറുപ്പും ഒഴിവാക്കാൻ 5% മാറ്റുന്നു (Outlier removal)
                let pLow = Math.floor(inkX.length * 0.05);
                let pHigh = Math.floor(inkX.length * 0.95);

                minX = Math.max(0, inkX[pLow] - padding);
                minY = Math.max(0, inkY[pLow] - padding);
                maxX = Math.min(width, inkX[pHigh] + padding);
                maxY = Math.min(height, inkY[pHigh] + padding);
            }

            let cropWidth = maxX - minX;
            let cropHeight = maxY - minY;

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropWidth;
            cropCanvas.height = cropHeight;
            const cropCtx = cropCanvas.getContext('2d');
            
            cropCtx.fillStyle = "#FFFFFF";
            cropCtx.fillRect(0, 0, cropWidth, cropHeight);
            cropCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

            return cropCanvas.toDataURL('image/png'); 
        }

        // --- UI സെറ്റപ്പ് ---
        function createUI(index) {
            const outputArea = document.getElementById('outputArea');
            const box = document.createElement('div');
            box.className = 'image-box';
            
            box.innerHTML = `
                <h4>Image ${index + 1}</h4>
                <img id="preview-${index}" class="preview-img" src="" alt="Processing..."><br>
                <div class="status-text" id="size-${index}">Size: Calculating...</div>
                
                <div class="controls-container">
                    <div class="control-group">
                        <label>ബാക്ക്ഗ്രൗണ്ട് കളയുക (Threshold): <span class="val-display" id="val-t-${index}">160</span></label>
                        <input type="range" id="slider-t-${index}" min="50" max="230" value="160" oninput="updateUIAndProcess(${index})">
                    </div>
                    <div class="control-group">
                        <label>നിറങ്ങളുടെ തെളിച്ചം (Vibrancy): <span class="val-display" id="val-v-${index}">50</span></label>
                        <input type="range" id="slider-v-${index}" min="0" max="150" value="50" oninput="updateUIAndProcess(${index})">
                    </div>
                    <div class="control-group">
                        <label>ക്ലാരിറ്റി (Smoothness): <span class="val-display" id="val-s-${index}">0</span></label>
                        <input type="range" id="slider-s-${index}" min="0" max="10" value="0" step="0.1" oninput="updateUIAndProcess(${index})">
                    </div>
                </div>
                
                <a id="download-${index}" href="#" download="final_sign_${index + 1}.jpg">
                    <button>Download JPG (< 15KB)</button>
                </a>
            `;
            outputArea.appendChild(box);
        }

        window.updateUIAndProcess = function(index) {
            const threshold = parseInt(document.getElementById(`slider-t-${index}`).value);
            const vibrancy = parseInt(document.getElementById(`slider-v-${index}`).value);
            const smoothness = parseFloat(document.getElementById(`slider-s-${index}`).value);

            document.getElementById(`val-t-${index}`).innerText = threshold;
            document.getElementById(`val-v-${index}`).innerText = vibrancy;
            document.getElementById(`val-s-${index}`).innerText = smoothness.toFixed(1);

            processImage(index, threshold, vibrancy, smoothness);
        };

        // --- സ്ലൈഡർ വഴിയുള്ള കളർ പ്രോസസ്സിംഗ് ---
        function processImage(index, threshold, vibrancy, smoothness) {
            const img = originalCroppedImages[index]; 
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;

            if(smoothness > 0) {
                ctx.filter = `blur(${smoothness}px)`;
            } else {
                ctx.filter = 'none';
            }

            ctx.drawImage(img, 0, 0, img.width, img.height);
            ctx.filter = 'none';

            let imgData = ctx.getImageData(0, 0, img.width, img.height);
            let data = imgData.data;

            const vibFactor = (vibrancy / 100) + 1; 

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                let brightness = (0.299 * r) + (0.587 * g) + (0.114 * b);

                if (brightness > threshold) {
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                } else {
                    if (vibrancy > 0) {
                        let avg = (r + g + b) / 3;
                        data[i]   = Math.min(255, Math.max(0, avg + vibFactor * (r - avg))); 
                        data[i+1] = Math.min(255, Math.max(0, avg + vibFactor * (g - avg))); 
                        data[i+2] = Math.min(255, Math.max(0, avg + vibFactor * (b - avg))); 
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // സൈസ് 15KB ആക്കാൻ കംപ്രഷൻ
            let quality = 0.95;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            let sizeKB = getBase64SizeKB(dataUrl);

            while (sizeKB > 15 && quality > 0.05) {
                quality -= 0.05;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
                sizeKB = getBase64SizeKB(dataUrl);
            }

            document.getElementById(`preview-${index}`).src = dataUrl;
            
            const sizeElement = document.getElementById(`size-${index}`);
            sizeElement.innerText = `Size: ${sizeKB.toFixed(2)} KB`;
            sizeElement.style.color = sizeKB <= 15 ? 'green' : 'red';

            document.getElementById(`download-${index}`).href = dataUrl;
        }

        function getBase64SizeKB(base64String) {
            let padding = 0;
            if (base64String.endsWith("==")) padding = 2;
            else if (base64String.endsWith("=")) padding = 1;
            const base64Length = base64String.length - (base64String.indexOf(',') + 1);
            return ((base64Length * 0.75) - padding) / 1024;
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="ml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Color Ink & Seal Optimizer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
    />
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        text-align: center;
        background: #f0f2f5;
        color: #333;
      }

      .container {
        max-width: 650px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      h2 {
        color: #007bff;
      }

      .image-box {
        margin: 20px 0;
        padding: 20px;
        border: 1px solid #e1e4e8;
        border-radius: 10px;
        background: #fafafa;
      }

      .preview-img {
        max-width: 100%;
        max-height: 180px;
        margin-top: 15px;
        border: 1px dashed #b1b1b1;
        background: #fff;
        border-radius: 5px;
      }

      button {
        padding: 10px 20px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 15px;
        font-size: 16px;
        transition: background 0.3s;
      }

      button:hover {
        background: #218838;
      }

      input[type="file"] {
        margin-bottom: 20px;
        width: 100%;
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #ddd;
        border-radius: 5px;
      }

      .controls-container {
        margin-top: 20px;
        background: #eee;
        padding: 15px;
        border-radius: 8px;
        text-align: left;
      }

      .control-group {
        margin-bottom: 12px;
      }

      .control-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 14px;
      }

      input[type="range"] {
        width: 100%;
        cursor: pointer;
      }

      .val-display {
        font-weight: normal;
        color: #666;
        float: right;
      }

      .status-text {
        font-weight: bold;
        font-size: 15px;
        margin-top: 15px;
      }

      /* ── Crop Section Styles ── */
      .crop-section {
        position: relative;
      }

      .crop-wrapper {
        /* Cropper.js needs a bounded container */
        max-height: 320px;
        overflow: hidden;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #222;
      }

      .crop-source-img {
        /* must be block; cropper replaces this with its own container */
        display: block;
        max-width: 100%;
      }

      .crop-hint {
        font-size: 12px;
        color: #888;
        margin: 8px 0 0;
      }

      .btn-confirm-crop {
        background: #007bff;
        margin-top: 12px;
      }

      .btn-confirm-crop:hover {
        background: #0056b3;
      }

      /* Re-crop link */
      .recrop-link {
        display: inline-block;
        margin-top: 8px;
        font-size: 13px;
        color: #007bff;
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>സിഗ്നേച്ചർ / സീൽ സെറ്റ് ചെയ്യാം</h2>
      <p>ബാക്ക്ഗ്രൗണ്ട് 'വെള്ള' ആക്കാനും നിറങ്ങൾ വർദ്ധിപ്പിക്കാനും.</p>

      <input type="file" id="imageInput" accept="image/*" multiple max="3" />
      <div id="outputArea"></div>
    </div>

    <div
      id="counterContainer"
      style="
        display: none;
        text-align: center;
        font-size: 14px;
        color: #4b5563;
        margin-top: 15px;
        padding: 10px;
        background-color: #e0e7ff;
        border-radius: 8px;
      "
    >
      Count:
      <span
        id="countDisplay"
        style="font-weight: 900; color: #4f46e5; font-size: 16px"
        >0</span
      >
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
      // Stores the raw File-reader Image objects (may be replaced after crop)
      let originalImages = [];
      // Stores active Cropper instances keyed by index
      let croppers = {};
      // Stores the raw data URL of each uploaded image (for re-crop)
      let rawDataURLs = [];

      /* ─────────────────────────────────────────
           FILE INPUT
        ───────────────────────────────────────── */
      document
        .getElementById("imageInput")
        .addEventListener("change", function (event) {
          const files = event.target.files;
          const outputArea = document.getElementById("outputArea");

          // Destroy any existing croppers
          Object.keys(croppers).forEach((i) => {
            if (croppers[i]) {
              croppers[i].destroy();
              delete croppers[i];
            }
          });
          outputArea.innerHTML = "";
          originalImages = [];
          rawDataURLs = [];

          if (files.length > 3) {
            alert("പരമാവധി 3 ചിത്രങ്ങൾ മാത്രം തിരഞ്ഞെടുക്കുക.");
            return;
          }

          Array.from(files).forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function (e) {
              rawDataURLs[index] = e.target.result; // keep original data url
              const img = new Image();
              img.onload = function () {
                originalImages[index] = img;
                createUI(index);
                initCropper(index, e.target.result);
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          });
        });

      /* ─────────────────────────────────────────
           BUILD THE UI SHELL FOR ONE IMAGE
        ───────────────────────────────────────── */
      function createUI(index) {
        const outputArea = document.getElementById("outputArea");
        const box = document.createElement("div");
        box.className = "image-box";
        box.id = `box-${index}`;

        box.innerHTML = `
                <h4>Image ${index + 1}</h4>

                <!-- ① CROP SECTION -->
                <div class="crop-section" id="crop-section-${index}">
                    <div class="crop-wrapper">
                        <img id="crop-img-${index}" class="crop-source-img" src="" alt="Crop preview">
                    </div>
                    <p class="crop-hint">📐 Drag the box to select the area you want. Resize from corners/edges.</p>
                    <button class="btn-confirm-crop" onclick="confirmCrop(${index})">✂️ Confirm Crop</button>
                </div>

                <!-- ② OUTPUT SECTION (shown after crop) -->
                <div id="output-section-${index}" style="display:none;">
                    <img id="preview-${index}" class="preview-img" src="" alt="Processed">
                    <br>
                    <div class="status-text" id="size-${index}">Size: Calculating...</div>
                    <span class="recrop-link" onclick="reCrop(${index})">↩ Re-crop image</span>

                    <div class="controls-container">
                        <div class="control-group">
                            <label>ബാക്ക്ഗ്രൗണ്ട് കളയുക (Threshold): <span class="val-display" id="val-t-${index}">160</span></label>
                            <input type="range" id="slider-t-${index}" min="50" max="230" value="160" oninput="updateUIAndProcess(${index})">
                        </div>
                        <div class="control-group">
                            <label>നിറങ്ങളുടെ തെളിച്ചം (Vibrancy): <span class="val-display" id="val-v-${index}">50</span></label>
                            <input type="range" id="slider-v-${index}" min="0" max="150" value="50" oninput="updateUIAndProcess(${index})">
                        </div>
                        <div class="control-group">
                            <label>ക്ലാരിറ്റി (Smoothness): <span class="val-display" id="val-s-${index}">1</span></label>
                            <input type="range" id="slider-s-${index}" min="0" max="10" value="1" step="0.1" oninput="updateUIAndProcess(${index})">
                        </div>
                    </div>

                    <a id="download-${index}" href="#" download="color_optimized_${index + 1}.jpg">
                        <button onclick="incrementCounter()">⬇️ Download JPG</button>
                    </a>
                </div>
            `;
        outputArea.appendChild(box);
      }

      /* ─────────────────────────────────────────
           INIT CROPPER.JS ON AN IMAGE ELEMENT
        ───────────────────────────────────────── */
      function initCropper(index, dataUrl) {
        const cropImg = document.getElementById(`crop-img-${index}`);

        // Destroy previous instance if any
        if (croppers[index]) {
          croppers[index].destroy();
          delete croppers[index];
        }

        // Safe Cropper Initialization
        const startCropper = function () {
          if (croppers[index]) return; // ഡബിൾ ഇനീഷ്യലൈസേഷൻ തടയുന്നു
          croppers[index] = new Cropper(cropImg, {
            viewMode: 1, // keep crop box within the canvas
            dragMode: "move", // move the canvas by default
            aspectRatio: NaN, // free ratio
            autoCropArea: 0.85, // pre-select ~85 % of the image
            restore: false,
            guides: true,
            center: true,
            highlight: false,
            cropBoxMovable: true,
            cropBoxResizable: true,
            toggleDragModeOnDblclick: false,
            zoomable: false, // disable scroll-zoom
            rotatable: false,
            scalable: false,
            responsive: true,
            checkOrientation: true,
          });
        };

        // ഇമേജ് ലോഡ് ആയ ശേഷം മാത്രം Cropper സ്റ്റാർട്ട് ചെയ്യുക
        cropImg.onload = startCropper;

        // Re-crop ചെയ്യുമ്പോൾ ബ്രൗസറിനെക്കൊണ്ട് നിർബന്ധമായും ഇമേജ് റീലോഡ് ചെയ്യിപ്പിക്കാൻ
        if (cropImg.src === dataUrl) {
          cropImg.removeAttribute("src");
        }

        // ഏറ്റവും അവസാനം മാത്രം src സെറ്റ് ചെയ്യുക
        cropImg.src = dataUrl;
      }

      /* ─────────────────────────────────────────
           CONFIRM CROP → EXTRACT → PROCESS
        ───────────────────────────────────────── */
      window.confirmCrop = function (index) {
        const cropper = croppers[index];
        if (!cropper) return;

        // getCroppedCanvas returns a <canvas> with only the selected region
        const croppedCanvas = cropper.getCroppedCanvas({
          imageSmoothingEnabled: true,
          imageSmoothingQuality: "high",
        });

        if (!croppedCanvas) {
          alert("Crop failed. Please try again.");
          return;
        }

        // Convert cropped canvas to an Image object and store it
        const croppedImg = new Image();
        croppedImg.onload = function () {
          originalImages[index] = croppedImg;

          // Destroy cropper to free memory
          cropper.destroy();
          delete croppers[index];

          // Swap sections
          document.getElementById(`crop-section-${index}`).style.display =
            "none";
          document.getElementById(`output-section-${index}`).style.display =
            "block";

          // Kick off optimisation with default slider values
          processImage(index, 160, 50, 1);
        };
        croppedImg.src = croppedCanvas.toDataURL("image/png"); // PNG keeps full quality before compression step
      };

      /* ─────────────────────────────────────────
           RE-CROP: go back to cropper stage
        ───────────────────────────────────────── */
      window.reCrop = function (index) {
        // Re-show crop section, hide output
        document.getElementById(`output-section-${index}`).style.display =
          "none";
        document.getElementById(`crop-section-${index}`).style.display =
          "block";

        // Reset sliders to defaults so output is fresh after re-crop
        const sliders = { t: 160, v: 50, s: 1 };
        ["t", "v", "s"].forEach((key) => {
          const el = document.getElementById(`slider-${key}-${index}`);
          if (el) el.value = sliders[key];
        });

        // Re-init the cropper with the ORIGINAL raw image
        initCropper(index, rawDataURLs[index]);
      };

      /* ─────────────────────────────────────────
           SLIDER → UPDATE VALUES → RE-PROCESS
        ───────────────────────────────────────── */
      window.updateUIAndProcess = function (index) {
        const threshold = parseInt(
          document.getElementById(`slider-t-${index}`).value,
        );
        const vibrancy = parseInt(
          document.getElementById(`slider-v-${index}`).value,
        );
        const smoothness = parseFloat(
          document.getElementById(`slider-s-${index}`).value,
        );

        document.getElementById(`val-t-${index}`).innerText = threshold;
        document.getElementById(`val-v-${index}`).innerText = vibrancy;
        document.getElementById(`val-s-${index}`).innerText =
          smoothness.toFixed(1);

        processImage(index, threshold, vibrancy, smoothness);
      };

      /* ─────────────────────────────────────────
           CORE IMAGE PROCESSING (unchanged logic)
        ───────────────────────────────────────── */
      function processImage(index, threshold, vibrancy, smoothness) {
        const img = originalImages[index];
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const MAX_WIDTH = 500;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) {
          height = Math.round((height * MAX_WIDTH) / width);
          width = MAX_WIDTH;
        }

        canvas.width = width;
        canvas.height = height;

        if (smoothness > 0) {
          ctx.filter = `blur(${smoothness}px)`;
        } else {
          ctx.filter = "none";
        }

        ctx.drawImage(img, 0, 0, width, height);
        ctx.filter = "none";

        let imgData = ctx.getImageData(0, 0, width, height);
        let data = imgData.data;

        const outCanvas = document.createElement("canvas");
        outCanvas.width = width;
        outCanvas.height = height;
        const outCtx = outCanvas.getContext("2d");
        outCtx.fillStyle = "#FFFFFF";
        outCtx.fillRect(0, 0, width, height);

        const vibFactor = vibrancy / 100 + 1;

        for (let i = 0; i < data.length; i += 4) {
          let r = data[i],
            g = data[i + 1],
            b = data[i + 2];
          let brightness = 0.299 * r + 0.587 * g + 0.114 * b;

          if (brightness > threshold) {
            data[i + 3] = 0;
          } else {
            if (vibrancy > 0) {
              let avg = (r + g + b) / 3;
              data[i] = Math.min(255, Math.max(0, avg + vibFactor * (r - avg)));
              data[i + 1] = Math.min(
                255,
                Math.max(0, avg + vibFactor * (g - avg)),
              );
              data[i + 2] = Math.min(
                255,
                Math.max(0, avg + vibFactor * (b - avg)),
              );
            }
          }
        }

        ctx.putImageData(imgData, 0, 0);
        outCtx.drawImage(canvas, 0, 0);

        let quality = 0.9;
        let dataUrl = outCanvas.toDataURL("image/jpeg", quality);
        let sizeKB = getBase64SizeKB(dataUrl);

        while (sizeKB > 15 && quality > 0.05) {
          quality -= 0.05;
          dataUrl = outCanvas.toDataURL("image/jpeg", quality);
          sizeKB = getBase64SizeKB(dataUrl);
        }

        document.getElementById(`preview-${index}`).src = dataUrl;

        const sizeElement = document.getElementById(`size-${index}`);
        sizeElement.innerText = `Size: ${sizeKB.toFixed(2)} KB`;
        if (sizeKB <= 15) {
          sizeElement.style.color = "green";
        } else {
          sizeElement.style.color = "red";
          sizeElement.innerText += " (Compressing failed, try smaller image)";
        }

        document.getElementById(`download-${index}`).href = dataUrl;
      }

      /* ─────────────────────────────────────────
           HELPERS
        ───────────────────────────────────────── */
      function getBase64SizeKB(base64String) {
        let padding = 0;
        if (base64String.endsWith("==")) padding = 2;
        else if (base64String.endsWith("=")) padding = 1;
        const base64Length =
          base64String.length - (base64String.indexOf(",") + 1);
        return (base64Length * 0.75 - padding) / 1024;
      }

      /* ─────────────────────────────────────────
           COUNTER
        ───────────────────────────────────────── */
      const counterNamespace = "crop-rubundroid";
      const counterKey = "total-calculations";

      function getInitialCount() {
        fetch(`https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}`)
          .then((r) => r.json())
          .then((data) => {
            if (data.count && data.count > 0) {
              document.getElementById("countDisplay").innerText = data.count;
              document.getElementById("counterContainer").style.display =
                "block";
            }
          })
          .catch(() =>
            console.log("Counter blocked by browser or ad-blocker."),
          );
      }

      function incrementCounter() {
        fetch(
          `https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}/up`,
        )
          .then((r) => r.json())
          .then((data) => {
            if (data.count) {
              document.getElementById("countDisplay").innerText = data.count;
              document.getElementById("counterContainer").style.display =
                "block";
            }
          })
          .catch(() => console.log("Counter increment failed."));
      }

      window.onload = function () {
        getInitialCount();
      };
    </script>
  </body>
</html>
